<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" shape-rendering="crispEdges">
  <!-- Triforce -->
  <g transform="translate(30 30) scale(2)" fill="#ffe07a">
    <rect x="5" y="1" width="2" height="1"/>
    <rect x="4" y="2" width="4" height="1"/>
    <rect x="3" y="3" width="6" height="1"/>
    <rect x="2" y="5" width="2" height="1"/>
    <rect x="1" y="6" width="4" height="1"/>
    <rect x="0" y="7" width="6" height="1"/>
    <rect x="8" y="5" width="2" height="1"/>
    <rect x="7" y="6" width="4" height="1"/>
    <rect x="6" y="7" width="6" height="1"/>
  </g>
  <!-- Heart container -->
  <g transform="translate(170 40) scale(1.6)" fill="#ff5d7e">
    <rect x="1" y="1" width="2" height="1"/>
    <rect x="5" y="1" width="2" height="1"/>
    <rect x="0" y="2" width="8" height="2"/>
    <rect x="1" y="4" width="6" height="1"/>
    <rect x="2" y="5" width="4" height="1"/>
    <rect x="3" y="6" width="2" height="1"/>
  </g>
  <!-- Sword -->
  <g transform="translate(40 160) scale(1.4)">
    <rect x="3" y="0" width="2" height="8" fill="#e0e6ec"/>
    <rect x="1" y="8" width="6" height="1" fill="#ffe07a"/>
    <rect x="2" y="9" width="4" height="2" fill="#8b4513"/>
    <rect x="3" y="11" width="2" height="2" fill="#8b4513"/>
  </g>
  <!-- Small triforce -->
  <g transform="translate(160 170)" fill="#ffe07a">
    <rect x="2" y="0" width="1" height="1"/>
    <rect x="1" y="1" width="3" height="1"/>
    <rect x="0" y="2" width="5" height="1"/>
    <rect x="1" y="3" width="3" height="1"/>
    <rect x="1" y="4" width="1" height="1"/>
    <rect x="3" y="4" width="1" height="1"/>
  </g>
</svg>
