<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" shape-rendering="crispEdges">
  <!-- Pokeball -->
  <g transform="translate(20 30)">
    <rect x="4" y="0" width="8" height="1" fill="#1a1206"/>
    <rect x="2" y="1" width="12" height="2" fill="#1a1206"/>
    <rect x="4" y="1" width="8" height="1" fill="#e63946"/>
    <rect x="2" y="3" width="12" height="3" fill="#e63946"/>
    <rect x="1" y="3" width="1" height="3" fill="#1a1206"/>
    <rect x="14" y="3" width="1" height="3" fill="#1a1206"/>
    <rect x="2" y="6" width="12" height="1" fill="#1a1206"/>
    <rect x="2" y="7" width="12" height="3" fill="#ffffff"/>
    <rect x="1" y="7" width="1" height="3" fill="#1a1206"/>
    <rect x="14" y="7" width="1" height="3" fill="#1a1206"/>
    <rect x="2" y="10" width="12" height="2" fill="#1a1206"/>
