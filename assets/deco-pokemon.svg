    <rect x="3" y="6" width="4" height="1" fill="#ffd836"/>
    <rect x="3" y="3" width="1" height="1" fill="#1a1206"/>
    <rect x="6" y="3" width="1" height="1" fill="#1a1206"/>
    <rect x="4" y="5" width="2" height="1" fill="#e63946"/>
    <rect x="1" y="2" width="1" height="1" fill="#ffd836"/>
    <rect x="8" y="2" width="1" height="1" fill="#ffd836"/>
  </g>
  <g transform="translate(195 200)" fill="#ffd836">
    <rect x="4" y="0" width="2" height="1"/>
    <rect x="3" y="1" width="2" height="1"/>
