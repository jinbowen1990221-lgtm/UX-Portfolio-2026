<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" shape-rendering="crispEdges">
  <!-- Kirby face -->
  <g transform="translate(30 40) scale(2)">
    <rect x="3" y="1" width="4" height="1" fill="#fff3a0"/>
    <rect x="2" y="2" width="6" height="4" fill="#ffd6ec"/>
    <rect x="3" y="6" width="4" height="1" fill="#ffd6ec"/>
    <rect x="3" y="3" width="1" height="1" fill="#2a0a1d"/>
    <rect x="6" y="3" width="1" height="1" fill="#2a0a1d"/>
    <rect x="4" y="5" width="2" height="1" fill="#cc3a7a"/>
    <rect x="2" y="4" width="1" height="1" fill="#ff9ed2"/>
    <rect x="7" y="4" width="1" height="1" fill="#ff9ed2"/>
  </g>
  <!-- Stars -->
  <g transform="translate(170 60) scale(2)" fill="#fff3a0">
    <rect x="2" y="0" width="1" height="1"/>
    <rect x="1" y="1" width="3" height="1"/>
    <rect x="0" y="2" width="5" height="1"/>
    <rect x="1" y="3" width="3" height="1"/>
    <rect x="1" y="4" width="1" height="1"/>
    <rect x="3" y="4" width="1" height="1"/>
  </g>
  <g transform="translate(60 170) scale(1.6)" fill="#fff3a0">
    <rect x="2" y="0" width="1" height="1"/>
    <rect x="1" y="1" width="3" height="1"/>
    <rect x="0" y="2" width="5" height="1"/>
    <rect x="1" y="3" width="3" height="1"/>
    <rect x="1" y="4" width="1" height="1"/>
    <rect x="3" y="4" width="1" height="1"/>
  </g>
  <!-- Small kirby -->
  <g transform="translate(180 180) scale(1.8)">
    <rect x="3" y="1" width="4" height="1" fill="#ffffff"/>
    <rect x="2" y="2" width="6" height="4" fill="#ffd6ec"/>
    <rect x="3" y="6" width="4" height="1" fill="#ffd6ec"/>
    <rect x="3" y="3" width="1" height="1" fill="#2a0a1d"/>
    <rect x="6" y="3" width="1" height="1" fill="#2a0a1d"/>
    <rect x="4" y="5" width="2" height="1" fill="#cc3a7a"/>
  </g>
  <!-- Sparkles (plus shape) -->
  <g transform="translate(110 30)" fill="#ffffff">
    <rect x="2" y="0" width="1" height="5"/>
    <rect x="0" y="2" width="5" height="1"/>
  </g>
  <g transform="translate(140 130)" fill="#ffffff">
    <rect x="2" y="0" width="1" height="5"/>
    <rect x="0" y="2" width="5" height="1"/>
  </g>
</svg>
